<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>场景对话生成 Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>场景对话生成 Demo</h1>
        <p>选择人物画像，设置场景与核心内容，生成对话文本与音频。</p>
      </header>

      <section class="card">
        <h2>人物画像（Owner）</h2>
        <div class="grid">
          <div class="field">
            <label>职业</label>
            <select id="jobFunction"></select>
            <input id="jobFunctionOther" class="other-input" placeholder="请输入其他职业" />
          </div>
          <div class="field">
            <label>工作内容</label>
            <select id="workContent"></select>
            <input id="workContentOther" class="other-input" placeholder="请输入其他工作内容" />
          </div>
          <div class="field">
            <label>职级</label>
            <select id="seniority"></select>
            <input id="seniorityOther" class="other-input" placeholder="请输入其他职级" />
          </div>
          <div class="field">
            <label>使用场景</label>
            <select id="useCase"></select>
            <input id="useCaseOther" class="other-input" placeholder="请输入其他使用场景" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>场景设置</h2>
        <div class="field">
          <label>情景对话设置</label>
          <textarea id="scenario" rows="4" placeholder="请输入情景对话设置"></textarea>
        </div>
        <div class="field">
          <label>对话核心内容（红色标注）</label>
          <textarea id="coreContent" rows="3" placeholder="请输入核心内容"></textarea>
        </div>
        <div class="field row">
          <div class="row-item">
            <label>人物数量（含 Owner）</label>
            <select id="peopleCount"></select>
          </div>
          <div class="row-item">
            <label>字数限制</label>
            <input id="wordCount" type="number" min="100" max="3000" value="500" />
          </div>
        </div>
      </section>

      <section class="card actions">
        <div class="actions-row">
          <button id="generateTextBtn">生成场景对话文本</button>
          <button id="generateAudioBtn" disabled>生成 mp3 音频</button>
        </div>
        <div class="progress" id="progressArea">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span id="progressText">等待开始</span>
        </div>
      </section>

      <section class="card">
        <h2>生成结果</h2>
        <div class="output" id="outputText">暂无对话内容</div>
        <div class="output-meta" id="outputMeta"></div>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
