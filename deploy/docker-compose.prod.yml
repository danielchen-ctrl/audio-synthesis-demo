# 生产部署：起 nginx / api / worker / redis / minio。
# 数据库使用外部托管 MySQL（AWS RDS），不在此编排内起 DB 容器。
# 使用（务必带 --env-file .env，否则 ${MINIO_*} 等无法插值）：
#   cd test-audio-builder-platform
#   docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d --build
#   docker compose --env-file .env -f deploy/docker-compose.prod.yml exec api python -m app.scripts.init_db
# 注：name 固定为 audio-builder，避免与服务器上其他 deploy/ 项目（traefik 等）命名空间冲突。

name: audio-builder

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      # - "443:443"  # 配好证书后开启
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      # - ./certs:/etc/nginx/certs:ro   # 证书放这里
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info -Q text_gen,audio_synth --concurrency=2
    env_file: ../.env
    depends_on:
      - redis
      - minio
    restart: unless-stopped

  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"
    restart: "no"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API（浏览器签名 URL 直连）
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb -p local/${MINIO_BUCKET} || true;
      echo 'MinIO bucket ready';
      "
    restart: "no"

volumes:
  redis_data:
  minio_data:
  frontend_dist:
