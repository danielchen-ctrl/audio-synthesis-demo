multilingual_meeting_intro:
  Japanese: こんにちは、私はプロジェクト責任者です。この会議について話しましょう。
  Korean: 안녕하세요, 저는 프로젝트 책임자입니다. 이번 회의를 논의해 보겠습니다.
  French: Bonjour, je suis le responsable du projet. Parlons de cette réunion.
  German: Hallo, ich bin für das Projekt verantwortlich. Lassen Sie uns dieses Meeting
    besprechen.
  Spanish: Hola, soy el responsable del proyecto. Hablemos de esta reunión.
  Portuguese: Olá, sou o responsável pelo projeto. Vamos discutir esta reunião.
  Cantonese: 你好，我係項目負責人。我哋先討論一下這個會議。
