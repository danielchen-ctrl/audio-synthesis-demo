conflict_prefix_sets_by_locale:
  zh:
  - - 但是我现在不能签字，核心问题是：
    - 我理解进度压力，不过我不同意按当前假设直接推进：
    - 我还是认为这里有风险，在回滚和验收证据明确前不能放行：
  - - 问题还没有收口，我反对现在把这个点当成已解决：
    - 我听到了方案，不过这个风险不能按默认可接受处理：
    - 实际上我不会签字，除非准入条件和兜底动作已经写清：
  en:
  - - 'But I cannot sign off yet because the core issue is still open: '
    - 'I understand the schedule pressure, but I do not agree with moving forward
      on the current assumption: '
    - 'However, I still see release risk here, and I cannot approve it before rollback
      and acceptance evidence are clear: '
  - - 'The problem is not closed yet, so I disagree with treating this item as resolved: '
    - 'I hear the plan, but that risk cannot be accepted as-is: '
    - 'Actually, I will not sign off unless the entry gate and fallback actions are
      explicit: '
  ja:
  - - '今は承認できません。核心的な問題がまだ未解決です。 '
    - 'スケジュールの圧力は理解していますが、今の前提のまま進める段階ではありません。 '
    - 'まだリリースリスクが残っており、ロールバックと受け入れ証跡がそろうまでは承認できません。 '
  - - 'この問題はまだ未解決で、解決済みとは見なせません。 '
    - '計画は理解していますが、このリスクはそのままでは受け入れられません。 '
    - '受け入れ条件とフォールバック対応が明確になるまでは承認できません。 '
  ko:
  - - '지금은 승인할 수 없습니다. 핵심 이슈가 아직 열려 있습니다. '
    - '일정 압박은 이해하지만, 현재 가정으로 바로 진행할 단계는 아닙니다. '
    - '여전히 출시 리스크가 남아 있어 롤백과 수용 증거가 명확해지기 전에는 승인할 수 없습니다. '
  - - '이 문제는 아직 열려 있으므로 해결된 것으로 보기 어렵습니다. '
    - '계획은 이해하지만 이 리스크는 지금 상태로 받아들이기 어렵습니다. '
    - '진입 기준과 폴백 조치가 명확해지기 전까지는 승인할 수 없습니다. '
  fr:
  - - 'Je ne peux pas encore valider cela, car le point central n''est pas encore
      résolu. '
    - 'Je comprends la pression du calendrier, mais l''hypothèse actuelle n''est pas
      prête à avancer. '
    - 'Je vois encore un risque de mise en production, et je ne peux pas approuver
      cela avant que le rollback et les preuves d''acceptation soient clairs. '
  - - 'Ce point est encore ouvert, je ne le considère donc pas comme réglé. '
    - 'Je comprends le plan, mais ce risque n''est pas acceptable en l''état. '
    - 'Je ne peux pas valider tant que les critères d''entrée et les actions de repli
      ne sont pas explicites. '
  de:
  - - 'Ich kann das noch nicht freigeben, weil der Kernpunkt noch offen ist. '
    - 'Ich verstehe den Zeitdruck, aber unter der aktuellen Annahme ist das noch nicht
      entscheidungsreif. '
    - 'Ich sehe hier weiterhin ein Release-Risiko und kann das nicht freigeben, bevor
      Rollback und Abnahmebelege klar sind. '
  - - 'Dieser Punkt ist noch offen; ich sehe ihn nicht als erledigt an. '
    - 'Ich verstehe den Plan, aber dieses Risiko ist so nicht akzeptabel. '
    - 'Ich kann erst freigeben, wenn Eingangskriterien und Fallback-Maßnahmen klar
      sind. '
  es:
  - - 'No puedo aprobar esto todavía porque el punto central sigue abierto. '
    - 'Entiendo la presión del calendario, pero la hipótesis actual todavía no está
      lista para avanzar. '
    - 'Sigo viendo riesgo de salida y no puedo aprobarlo hasta que el rollback y la
      evidencia de aceptación estén claros. '
  - - 'Este punto sigue abierto, así que no lo considero resuelto. '
    - 'Entiendo el plan, pero ese riesgo no es aceptable tal como está. '
    - 'No puedo aprobarlo hasta que los criterios de entrada y las acciones de fallback
      estén explícitos. '
  pt:
  - - 'Ainda não posso aprovar isso porque o ponto central continua em aberto. '
    - 'Entendo a pressão do cronograma, mas a hipótese atual ainda não está pronta
      para avançar. '
    - 'Ainda vejo risco de release e não posso aprovar enquanto rollback e evidências
      de aceitação não estiverem claros. '
  - - 'Esse ponto ainda está em aberto, então não o considero resolvido. '
    - 'Entendo o plano, mas esse risco não é aceitável do jeito atual. '
    - 'Não posso aprovar enquanto os critérios de entrada e as ações de fallback não
      estiverem explícitos. '
