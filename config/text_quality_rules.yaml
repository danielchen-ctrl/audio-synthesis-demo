persona_prefixes:
  en:
    QA: 'From QA validation, the acceptance gate and no-go criteria are still not
      explicit. '
    PM: 'From the product goal and schedule side, '
    Backend: 'From the engineering side, the implementation risk and rollback cost
      are still high. '
  zh:
    QA: 从QA验证角度看，准入条件和No-Go标准还不够清楚。
    PM: 从产品目标和进度侧看，
    Backend: 从技术实现侧看，当前实现成本和回滚风险都偏高。
  ja:
    QA: QA検証の観点では、受け入れ条件とNo-Go基準がまだ十分に明確ではありません。
    PM: プロダクトと進行管理の観点では、
    Backend: 技術観点では、実装コストとロールバックリスクがまだ高いです。
  ko:
    QA: 'QA 관점에서는 수용 기준과 No-Go 기준이 아직 충분히 명확하지 않습니다. '
    PM: '제품과 일정 관점에서 보면, '
    Backend: '기술 관점에서 보면 구현 비용과 롤백 리스크가 아직 높습니다. '
  fr:
    QA: 'Côté QA, les critères d''acceptation et le no-go ne sont pas encore assez
      explicites. '
    PM: 'Du point de vue produit et delivery, '
    Backend: 'Sur le plan technique, le coût d''implémentation et le risque de rollback
      restent élevés. '
  de:
    QA: 'Aus QA-Perspektive sind die Abnahmekriterien und No-Go-Bedingungen noch nicht
      klar genug. '
    PM: 'Aus Produkt- und Lieferperspektive, '
    Backend: 'Technisch betrachtet sind Implementierungskosten und Rollback-Risiko
      weiterhin hoch. '
  es:
    QA: 'Desde la perspectiva de QA, los criterios de aceptación y el no-go todavía
      no están lo bastante claros. '
    PM: 'Desde la perspectiva de producto y entrega, '
    Backend: 'Desde una perspectiva técnica, el coste de implementación y el riesgo
      de rollback siguen siendo altos. '
  pt:
    QA: 'Na perspectiva de QA, os critérios de aceitação e o no-go ainda não estão
      suficientemente claros. '
    PM: 'Na perspectiva de produto e entrega, '
    Backend: 'Sob a perspectiva técnica, o custo de implementação e o risco de rollback
      continuam altos. '
  yue:
    QA: 從 QA 角度睇，驗收條件同 No-Go 標準仲未夠清楚。
    PM: 從產品同交付角度睇，
    Backend: 從技術角度睇，實現成本同回滾風險仲係偏高。
