name: Multilingual Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  multilingual-quality-gate:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate rule configs
        run: python scripts/validate_rule_configs.py

      - name: Run multilingual quality checks
        run: python scripts/run_multilingual_quality_checks.py

      - name: Enforce quality gate
        run: python scripts/enforce_multilingual_quality_gate.py --report reports/multilingual_quality_checks/latest.json --max-age-hours 24
