name: CI

on:
  push:
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f config/requirements.txt ]; then
            python -m pip install -r config/requirements.txt
          else
            echo "No config/requirements.txt found, skip dependency install."
          fi

      - name: Run pytest if available
        shell: bash
        run: |
          if python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('pytest') else 1)"
          then
            python -m pytest
          else
            echo "pytest is not installed. Skip test run and finish successfully."
          fi
